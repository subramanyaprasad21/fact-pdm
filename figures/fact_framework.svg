<svg xmlns="http://www.w3.org/2000/svg" width="680" height="500" viewBox="0 0 680 500" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="680" height="500" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="180" y="22" width="180" height="34" rx="9" fill="#f1efe8" stroke="#b4b2a9" stroke-width="1"/>
  <text x="270" y="44" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2a">Industrial dataset</text>
  <line x1="270" y1="56" x2="270" y2="70" stroke="#888780" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 1 -->
  <rect x="80" y="72" width="380" height="88" rx="11" fill="#fbfcfd" stroke="#cfd8e0" stroke-width="1"/>
  <circle cx="114" cy="101" r="18" fill="#0C447C"/>
  <text x="114" y="101" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="#ffffff">1</text>
  <text x="148" y="96" font-size="15" font-weight="700" fill="#1a1a1a">Feasibility Screening</text>
  <text x="148" y="117" font-size="12.5" fill="#5f5e5a">PR-AUC lift over a random baseline</text>
  <rect x="148" y="129" width="296" height="22" rx="4" fill="#185FA5" opacity="0.10"/>
  <text x="158" y="144" font-size="12" fill="#0C447C">lift &lt; 1.2&#215; &#8594; stop  &#183;  &#8805; 2&#215; &#8594; proceed</text>

  <!-- Gate -->
  <line x1="270" y1="160" x2="270" y2="172" stroke="#888780" stroke-width="2"/>
  <polygon points="270,172 294,188 270,204 246,188" fill="#ffffff" stroke="#378ADD" stroke-width="1.5"/>
  <text x="238" y="188" text-anchor="end" dominant-baseline="central" font-size="12" fill="#5f5e5a">lift &#8805; 1.2&#215; ?</text>
  <line x1="270" y1="204" x2="270" y2="216" stroke="#888780" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="214" font-size="11.5" fill="#5f5e5a">yes</text>
  <line x1="294" y1="188" x2="470" y2="188" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr)"/>
  <text x="312" y="180" font-size="11.5" fill="#A32D2D">no</text>
  <rect x="474" y="170" width="158" height="36" rx="8" fill="#E24B4A"/>
  <text x="553" y="188" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#ffffff">STOP &#183; fix data</text>

  <!-- Stage 2 -->
  <rect x="80" y="216" width="380" height="88" rx="11" fill="#fbfcfd" stroke="#cfd8e0" stroke-width="1"/>
  <circle cx="114" cy="245" r="18" fill="#185FA5"/>
  <text x="114" y="245" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="#ffffff">2</text>
  <text x="148" y="240" font-size="15" font-weight="700" fill="#1a1a1a">Imbalance Assessment</text>
  <text x="148" y="261" font-size="12.5" fill="#5f5e5a">report recall, not just accuracy</text>
  <rect x="148" y="273" width="296" height="22" rx="4" fill="#185FA5" opacity="0.10"/>
  <text x="158" y="288" font-size="12" fill="#0C447C">&gt; 40:1 resample  &#183;  10&#8211;40:1 compare  &#183;  &lt; 5:1 minimal</text>

  <line x1="270" y1="304" x2="270" y2="324" stroke="#888780" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 3 -->
  <rect x="80" y="324" width="380" height="88" rx="11" fill="#fbfcfd" stroke="#cfd8e0" stroke-width="1"/>
  <circle cx="114" cy="353" r="18" fill="#378ADD"/>
  <text x="114" y="353" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="700" fill="#ffffff">3</text>
  <text x="148" y="348" font-size="15" font-weight="700" fill="#1a1a1a">Cost-Tuned Deployment</text>
  <text x="148" y="369" font-size="12.5" fill="#5f5e5a">set decision threshold by FN:FP cost ratio</text>
  <rect x="148" y="381" width="296" height="22" rx="4" fill="#185FA5" opacity="0.10"/>
  <text x="158" y="396" font-size="12" fill="#0C447C">1:1 &#8594; 0.5  &#183;  10:1 &#8594; 0.15  &#183;  50:1+ &#8594; 0.05</text>

  <line x1="270" y1="412" x2="270" y2="432" stroke="#888780" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="180" y="434" width="180" height="38" rx="10" fill="#639922"/>
  <path d="M208 453 l6 6 l12 -12" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="292" y="453" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="#ffffff">Deploy model</text>
</svg>
